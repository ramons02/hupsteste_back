spring.application.name=hupsteste
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.kygxbuafpdkupknbeywb}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:*FEc3Z$8f?Jj6,p}

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Jackson — serializa LocalDate como "yyyy-MM-dd" e não como array
# spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# JWT
jwt.secret=${JWT_SECRET:aHVwc3Rlc3RlLWp3dC1zZWNyZXQta2V5LWZvci1hdXRoLTIwMjQ=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# HikariCP — testa conexão antes de usar (corrige erro 25P02 do PgBouncer)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000